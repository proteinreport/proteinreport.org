<div class="row row-cols-1 row-cols-lg-2 g-lg-5">
{{ range first 4 ( where .Site.RegularPages "Section" "articles" )}}
  <div class="col">
    <div class="card">
      {{- .Scratch.Set "fillImage" "1270x620 Center" -}}
      {{ partial "content/card-image.html" . }}
      <div class="card-body">
        <article>
          <h2 class="h3"><a class="stretched-link text-body" href="{{ .RelPermalink }}">{{ .Params.title }}</a></h2>
          <p>{{ .Params.excerpt | safeHTML }}</p>
          {{ partial "main/article-meta.html" . -}}
        </article>
      </div>
    </div>
  </div>
{{ end }}
</div>
